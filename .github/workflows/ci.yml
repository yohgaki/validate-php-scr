name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, gmp, mbstring
          coverage: none

      - name: Check extensions
        run: php -m | grep -E 'bcmath|gmp|mbstring'

      - name: Run tests
        run: cd src && php run-tests.php -p $(which php) --show-diff tests

  lint:
    name: phpcs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: cs2pr
          coverage: none

      - name: Install phpcs
        run: curl -sSfL https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar -o /usr/local/bin/phpcs && chmod +x /usr/local/bin/phpcs

      - name: Run phpcs
        run: phpcs --standard=src/phpcs.xml src/
